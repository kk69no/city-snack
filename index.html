<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="СИТИ СНЭК — бургеры, шаурма, хот-доги, такос, гиро. Два адреса: ул. Чернышевского 167, ул. Кирова 2/2. Доставка и самовывоз.">
<meta name="keywords" content="Сити Снэк, бургеры, шаурма, хот-доги, такос, гиро, фастфуд, доставка, Чернышевского, Кирова, меню">
<meta name="theme-color" content="#0a0a0a">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="СИТИ СНЭК — Бургеры, Шаурма, Такос">
<meta property="og:description" content="Фастфуд-ресторан с двумя точками. Бургеры, шаурма, хот-доги, такос, гиро. Премиальное качество по доступным ценам.">

<title>СИТИ СНЭК — Бургеры, Шаурма, Такос | Меню и Доставка</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden;font-weight:400;-webkit-overflow-scrolling:touch}

/* ===== CSS VARIABLES ===== */
:root{
  --accent:#F97515;
  --accent-hover:#FB8C3C;
  --accent-light:rgba(249,117,21,0.08);
  --star:#F97515;
  --radius:12px;
  --shadow:0 8px 30px rgba(0,0,0,.2);
  --transition:.3s cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#0c0c0c;
  --bg-card:#181818;
  --bg-header:rgba(12,12,12,0.92);
  --bg-input:#1e1e1e;
  --text:#f0ede8;
  --text-secondary:#a09a93;
  --text-muted:#7a756e;
  --border:rgba(255,255,255,0.1);
  --tag-bg:rgba(255,255,255,0.07);
  --modal-bg:rgba(0,0,0,0.92);
}
[data-theme="light"]{
  --bg:#f8f6f2;
  --bg-card:#ffffff;
  --bg-header:rgba(248,246,242,0.88);
  --bg-input:#ffffff;
  --text:#1a1816;
  --text-secondary:#6b665f;
  --text-muted:#9a958e;
  --border:rgba(0,0,0,0.07);
  --tag-bg:rgba(0,0,0,0.04);
  --modal-bg:rgba(255,255,255,0.95);
  --accent:#a68932;
  --accent-hover:#E06A10;
  --accent-light:rgba(249,117,21,0.06);
  --star:#E06A10;
}
body{background:var(--bg);color:var(--text)}

/* ===== HIDE EMOJI ICONS ===== */
.h-icon{display:none}
.house-icon{display:none}

/* ===== VIEWS SYSTEM ===== */
.view{
  position:absolute;top:0;left:0;width:100%;min-height:100vh;
  opacity:0;pointer-events:none;transform:translateY(20px);
  transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1);
  z-index:0;
}
.view.active{
  position:relative;opacity:1;pointer-events:auto;transform:translateY(0);z-index:1;
  background:var(--bg);
}

/* ===== LANDING PAGE ===== */
.landing{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  overflow:hidden;
  padding:2rem;
  text-align:center;
}
.landing.active{position:relative}
.landing .landing-theme-toggle{
  position:absolute;top:1.2rem;right:1.2rem;z-index:10;
  background:none;border:1px solid var(--border);color:var(--text-muted);
  width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
}
.landing .landing-theme-toggle:hover{border-color:rgba(249,117,21,0.4);color:var(--accent)}
.landing::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(249,117,21,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(249,117,21,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(249,117,21,0.03) 0%, transparent 50%);
  pointer-events:none;
}
.landing::after{
  content:'';
  position:absolute;
  inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
}
.landing-logo{
  margin-bottom:2rem;animation:fadeInDown .8s cubic-bezier(.16,1,.3,1);
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
}
.landing-logo-img{
  width:min(85vw, 380px);height:auto;
  filter:drop-shadow(0 4px 24px rgba(249,117,21,0.12));
}
[data-theme="light"] .landing-logo-img,
[data-theme="light"] .header-logo-img{
  filter:brightness(0.15) drop-shadow(0 2px 8px rgba(249,117,21,0.1));
}
.landing-tagline{
  font-family:'Inter',sans-serif;
  font-size:.75rem;
  letter-spacing:0.25em;
  color:var(--text-muted);
  font-weight:400;
  text-transform:uppercase;
  margin:0;
}
.landing-buttons{
  display:flex;flex-direction:column;gap:1.2rem;width:100%;max-width:400px;
  position:relative;z-index:1;
}
.landing-buttons::before{
  content:'';
  display:block;
  width:60px;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  margin:0 auto 2rem;
}
.landing-btn{
  display:flex;
  padding:1.1rem 2rem;
  border:1px solid rgba(249,117,21,0.3);
  border-radius:8px;
  background:rgba(249,117,21,0.06);
  color:var(--accent);
  font-size:1rem;
  font-weight:500;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  text-decoration:none;
  letter-spacing:0.06em;
  box-shadow:none;
  position:relative;
}
.landing-btn:hover{
  background:rgba(249,117,21,0.12);
  border-color:rgba(249,117,21,0.6);
  color:#FB8C3C;
  transform:translateY(-1px);
  box-shadow:0 4px 30px rgba(249,117,21,0.12);
}
.landing-btn{flex-direction:column;align-items:center;gap:.15rem}
.landing-btn-icon{font-size:1.2rem}
.landing-btn-text{font-size:1rem;font-weight:600}
.landing-btn-phone{font-size:.78rem;color:var(--text-muted);font-weight:400}
.landing-btn:active{transform:translateY(0)}
.landing-subtitle{
  font-size:.82rem;color:var(--text-muted);letter-spacing:.08em;
  margin-bottom:1.5rem;position:relative;z-index:1;text-transform:uppercase;
}
.landing-social{
  margin-top:2.5rem;display:flex;gap:1rem;position:relative;z-index:1;
}
.social-link{
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(249,117,21,0.25);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all var(--transition);
  text-decoration:none;
}
.social-link:hover{
  color:var(--accent);border-color:rgba(249,117,21,0.5);
  background:rgba(249,117,21,0.08);transform:translateY(-2px);
}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}

/* ===== STICKY HEADER ===== */
.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-header);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:.45rem .8rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  will-change:transform;
}
.header-logo-img{
  height:28px;width:auto;
  flex-shrink:0;
}
.header-right{display:flex;align-items:center;gap:.4rem}
.btn-change-addr{
  background:none;border:none;color:var(--text-muted);
  padding:.3rem .5rem;border-radius:4px;cursor:pointer;font-size:.75rem;
  font-weight:500;font-family:'Inter',sans-serif;
  transition:color var(--transition);white-space:nowrap;
}
.btn-change-addr:hover{color:var(--accent)}
.theme-toggle{
  background:none;border:none;color:var(--text-muted);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:color var(--transition);
}
.theme-toggle:hover{color:var(--accent)}

/* ===== CATEGORY NAV ===== */
.cat-nav{
  position:sticky;top:40px;z-index:90;background:var(--bg);
  border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.cat-nav::-webkit-scrollbar{display:none}
.cat-nav-inner{display:flex;gap:0;padding:0 .6rem}
.cat-tab{
  padding:.45rem .8rem;
  border:none;
  border-radius:0;
  background:none;
  color:var(--text-muted);
  font-size:.75rem;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
  transition:color .2s;
  border-bottom:2px solid transparent;
  font-family:'Inter',sans-serif;
}
.cat-tab:hover{color:var(--accent)}
.cat-tab.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}

/* ===== SEARCH & FILTERS ===== */
.search-filters{padding:.5rem .8rem .4rem;max-width:1200px;margin:0 auto}
.search-bar{
  display:flex;align-items:center;gap:.5rem;background:var(--bg-input);
  border:1px solid var(--border);border-radius:8px;padding:.4rem .8rem;
  margin-bottom:.5rem;transition:border-color .2s;
}
.search-bar:focus-within{border-color:rgba(249,117,21,0.4)}
.search-bar svg{flex-shrink:0;color:var(--text-muted);width:16px;height:16px}
.search-bar input{
  flex:1;background:none;border:none;outline:none;font-size:.85rem;
  color:var(--text);font-family:'Inter',sans-serif;
}
.search-bar input::placeholder{color:var(--text-muted)}
.search-clear{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:1rem;padding:0 .2rem;transition:color .2s;display:none;
  line-height:1;
}
.search-clear.show{display:block}
.search-clear:hover{color:var(--accent)}
.filter-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.filter-tag{
  padding:.25rem .6rem;border-radius:4px;border:1px solid var(--border);
  background:none;color:var(--text-secondary);font-size:.72rem;
  font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;
}
.filter-tag:hover{border-color:rgba(249,117,21,0.4);color:var(--accent)}
.filter-tag.active{background:var(--accent-light);color:var(--accent);border-color:rgba(249,117,21,0.3)}

/* ===== MENU CONTENT ===== */
.menu-content{max-width:1200px;margin:0 auto;padding:0 .8rem 1.5rem}
.menu-section{margin-bottom:1.8rem}
.menu-section h2{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;
  font-weight:600;
  margin-bottom:1rem;
  padding-top:1.2rem;
  color:var(--text);
  letter-spacing:0.02em;
  border-bottom:none;
  padding-bottom:0;
  display:flex;
  align-items:center;
  gap:0.4rem;
}
.menu-section h2::after{
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--border), transparent);
  margin-left:.8rem;
}
.menu-section[id]{scroll-margin-top:90px}

/* Card grid */
.card-grid{display:grid;grid-template-columns:1fr;gap:1.2rem}
@media(min-width:768px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1025px){.card-grid{grid-template-columns:repeat(3,1fr)}}

/* Food card */
.food-card{
  background:var(--bg-card);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;
  transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);
  opacity:1;transform:translateY(0);
}
.food-card.fade-in{opacity:0;transform:translateY(30px)}
.food-card.visible{opacity:1;transform:translateY(0);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s}
.food-card:hover{
  transform:translateY(-3px);
  border-color:rgba(249,117,21,0.2);
  box-shadow:0 8px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(249,117,21,0.1);
}
.food-card-img{
  width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--bg-input);
  display:block;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
}
.food-card:hover .food-card-img{transform:scale(1.03)}
.food-card-img-placeholder{
  width:100%;aspect-ratio:16/10;background:var(--bg-input);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;color:var(--text-muted);
}
.food-card-body{padding:.8rem 1rem}
.food-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.3rem}
.food-card-name{font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;flex:1;margin-right:.5rem;color:var(--text)}
.food-card-rating{
  display:flex;align-items:center;gap:.2rem;font-size:.85rem;font-weight:600;
  color:var(--star);white-space:nowrap;
}
.food-card-desc{font-size:.82rem;color:var(--text-secondary);margin-bottom:.6rem;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.food-card-bottom{display:flex;justify-content:space-between;align-items:center}
.food-card-weight{font-size:.8rem;color:var(--text-muted)}
.food-card-price{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent)}
.food-card-tags{display:flex;gap:.3rem;margin-top:.4rem}
.food-card-tag{font-size:.7rem;padding:.15rem .5rem;border-radius:4px;font-weight:600}
.food-card-tag.spicy{background:rgba(220,50,50,.12);color:#e55}
.food-card-tag.veg{background:rgba(50,180,50,.12);color:#4c4}


/* Addons section */
.addons-section{display:flex;flex-wrap:wrap;gap:1.5rem;justify-content:center}
.addons-col{flex:1;min-width:200px;max-width:320px}
.addons-col h3{font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;margin-bottom:.6rem;color:var(--accent);letter-spacing:.01em}
.addon-row{
  display:flex;justify-content:space-between;padding:.4rem 0;
  border-bottom:1px dashed var(--border);font-size:.9rem;color:var(--text-secondary);
}
.addon-row span:last-child{font-weight:700;color:var(--accent);white-space:nowrap}

/* Drinks section */
.drinks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem;margin-bottom:1.5rem}
.drink-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:.8rem 1rem;transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition);
  opacity:1;transform:translateY(0);
  backdrop-filter:blur(4px);
}
.drink-card.fade-in{opacity:0;transform:translateY(20px)}
.drink-card.visible{opacity:1;transform:translateY(0);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1),border-color .3s,box-shadow .3s}
.drink-card:hover{
  transform:translateY(-2px);
  border-color:rgba(249,117,21,0.15);
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.drink-name{font-family:'Inter',sans-serif;font-weight:600;font-size:.92rem;margin-bottom:.2rem;color:var(--text)}
.drink-price{color:var(--accent);font-weight:700;font-size:.9rem}
.drink-variants{font-size:.78rem;color:var(--text-muted)}

/* ===== REVIEWS ===== */
.reviews-section{max-width:1200px;margin:0 auto;padding:0 .8rem 1.5rem}
.reviews-section h2{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:600;margin-bottom:1.5rem;padding-top:2rem;
  color:var(--text);
  border-bottom:none;padding-bottom:0;
  display:flex;align-items:center;gap:0.5rem;
  letter-spacing:0.02em;
  scroll-margin-top:120px;
}
.reviews-section h2::after{
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--border), transparent);
  margin-left:1rem;
}
.reviews-grid{display:grid;grid-template-columns:1fr;gap:1rem}
@media(min-width:768px){.reviews-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1025px){.reviews-grid{grid-template-columns:repeat(3,1fr)}}
.review-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.2rem;opacity:1;transform:translateY(0);
  transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1);
  position:relative;
}
.review-card.fade-in{opacity:0;transform:translateY(30px)}
.review-card::before{
  content:'\201C';
  position:absolute;
  top:.6rem;right:1rem;
  font-family:'Playfair Display',serif;
  font-size:3rem;
  color:rgba(249,117,21,0.1);
  line-height:1;
  pointer-events:none;
}
.review-card.visible{opacity:1;transform:translateY(0)}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.review-author{font-family:'Inter',sans-serif;font-weight:600;font-size:.95rem;color:var(--text)}
.review-date{font-size:.78rem;color:var(--text-muted)}
.review-stars{color:var(--star);font-size:.9rem;margin-bottom:.5rem;letter-spacing:1px}
.review-text{font-size:.88rem;color:var(--text-secondary);line-height:1.6;font-style:italic}

/* ===== FOOTER ===== */
.site-footer{
  background:var(--bg-card);border-top:1px solid var(--border);padding:1.5rem .8rem;
  margin-top:1.5rem;
}
.footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:1.5rem}
@media(min-width:768px){.footer-inner{grid-template-columns:repeat(3,1fr)}}
.footer-block h3{font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;color:var(--accent);margin-bottom:.6rem;letter-spacing:.04em;text-transform:uppercase}
.footer-block p,.footer-block a{font-size:.88rem;color:var(--text-secondary);line-height:1.7}
.footer-block a{text-decoration:none;transition:color var(--transition)}
.footer-block a:hover{color:var(--accent)}
.footer-schedule-row{display:flex;justify-content:space-between;max-width:220px;font-size:.88rem;color:var(--text-secondary)}
.footer-map{
  width:100%;height:200px;border-radius:var(--radius);background:var(--bg-input);
  border:1px solid var(--border);overflow:hidden;position:relative;
}
.footer-map iframe{
  width:100%;height:100%;border:0;border-radius:var(--radius);
  filter:saturate(0.8) contrast(1.05);
}
[data-theme="dark"] .footer-map iframe{
  filter:invert(0.92) hue-rotate(180deg) saturate(0.6) contrast(1.1);
}
.footer-copy{text-align:center;margin-top:1.5rem;font-size:.8rem;color:var(--text-muted);
  padding-top:1rem;border-top:1px solid var(--border);letter-spacing:.02em}

/* ===== BACK TO TOP ===== */
.back-top{
  position:fixed;bottom:2rem;right:2rem;z-index:200;
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(249,117,21,0.3);
  background:var(--bg-card);color:var(--accent);font-size:1.1rem;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  opacity:0;transform:translateY(20px);pointer-events:none;
  transition:all var(--transition);display:flex;align-items:center;justify-content:center;
}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{
  border-color:rgba(249,117,21,0.6);
  background:rgba(249,117,21,0.08);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(249,117,21,0.15);
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.85);
  display:flex;align-items:flex-end;justify-content:center;

// ===== NAVIGATION =====
function navigateTo(view) {
  window.location.hash = view;
}

function setView(view) {
  const map = {landing:'view-landing', chernyshevskogo:'view-chernyshevskogo', kirova:'view-kirova'};
  const id = map[view];
  if (!id) return;
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  var el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    window.scrollTo({top:0, behavior:'auto'});
    currentView = view;
    // Run observer after view transition completes
    setTimeout(observeCards, 200);
    // Fallback: force show all cards if observer fails
    setTimeout(function(){
      el.querySelectorAll('.food-card, .drink-card, .review-card').forEach(function(c){
        c.classList.add('visible');
      });
    }, 600);
  }
}

window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#','') || 'landing';
  setView(hash);
});

// ===== THEME =====
function toggleTheme() {
  var html = document.documentElement;
  var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('cs-theme', next);
  updateThemeIcons();
}

function updateThemeIcons() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.querySelectorAll('.theme-icon').forEach(function(el){
    el.textContent = isDark ? '\u263E' : '\u2600';
  });
}

// ===== RENDER =====
function renderMenu(loc) {
  var container = document.getElementById('menu-' + loc);
  var tabsContainer = document.getElementById('cat-tabs-' + loc);
  var html = '';
  var tabs = [];
  var sectionOrder = ['burgers','hotdogs','shawarma','giro','snacks','addons'];

  sectionOrder.forEach(function(key) {
    var section = MENU_DATA[key];
    if (!section) return;
    if (!section.locations.includes(loc)) return;

    var sectionId = 'sec-' + loc + '-' + key;
    var title = section.title || '';
    if (key === 'giro') title = loc === 'ki' ? section.title_ki : section.title_ch;
    tabs.push({id: sectionId, label: section.icon + ' ' + title});

    html += '<section class="menu-section" id="' + sectionId + '">';
    html += '<h2>' + section.icon + ' ' + title + '</h2>';

    if (section.type === 'addons') {
      html += renderAddons(section);
    } else {
      html += '<div class="card-grid" data-section="' + key + '">';
      section.items.forEach(function(item, i) {
        html += renderFoodCard(item, key, i, loc);
      });
      html += '</div>';
    }
    html += '</section>';
  });

  // Drinks
  var drinkSecId = 'sec-' + loc + '-drinks';
  if (loc === 'ch') {
    var d = DRINKS_DATA.ch;
    tabs.push({id: drinkSecId, label: d.icon + ' ' + d.title});
    html += '<section class="menu-section" id="' + drinkSecId + '">';
    html += '<h2>' + d.icon + ' ' + d.title + '</h2>';
    html += '<div class="drinks-grid">';
    d.items.forEach(function(item){ html += renderDrinkCard(item); });
    html += '</div></section>';
  } else {
    tabs.push({id: drinkSecId, label: '\u2615 \u041D\u0430\u043F\u0438\u0442\u043A\u0438'});
    html += '<section class="menu-section" id="' + drinkSecId + '">';
    DRINKS_DATA.ki.sections.forEach(function(sec) {
      html += '<h2>' + sec.icon + ' ' + sec.title + '</h2>';
      html += '<div class="drinks-grid">';
      sec.items.forEach(function(item){ html += renderDrinkCard(item); });
      html += '</div>';
    });
    html += '</section>';
  }

  // Reviews tab
  tabs.push({id: 'sec-' + loc + '-reviews', label: '\u2B50 \u041E\u0442\u0437\u044B\u0432\u044B'});

  container.innerHTML = html;

  // Tabs
  tabsContainer.innerHTML = tabs.map(function(t){
    return '<button class="cat-tab" data-target="' + t.id + '" onclick="scrollToSection(\'' + t.id + '\')">' + t.label + '</button>';
  }).join('');

  renderReviews(loc);
  renderFooter(loc);
}

function renderFoodCard(item, section, index, loc) {
  var priceDisplay = item.priceLabel || (item.price + '\u20BD');
  var tagsHtml = (item.tags||[]).map(function(t){
    var cls = t === 'spicy' ? 'spicy' : 'veg';
    var label = t === 'spicy' ? '\uD83C\uDF36 \u041E\u0441\u0442\u0440\u043E\u0435' : '\uD83E\uDD6C \u0412\u0435\u0433';
    return '<span class="food-card-tag ' + cls + '">' + label + '</span>';
  }).join('');

  return '<div class="food-card" data-name="' + escapeAttr(item.name) + '" data-price="' + item.price + '" data-tags="' + (item.tags||[]).join(',') + '" data-section="' + section + '" data-idx="' + index + '" data-loc="' + loc + '">' +
    '<img class="food-card-img" src="' + (item.img||'') + '" alt="' + escapeAttr(item.name) + '" loading="lazy" onerror="this.outerHTML=\'<div class=food-card-img-placeholder>\uD83C\uDF7D</div>\'">' +
    '<div class="food-card-body">' +
      '<div class="food-card-top"><span class="food-card-name">' + item.name + '</span><span class="food-card-rating">\u2605 ' + item.rating + '</span></div>' +
      '<p class="food-card-desc">' + item.desc + '</p>' +
      (tagsHtml ? '<div class="food-card-tags">' + tagsHtml + '</div>' : '') +
      '<div class="food-card-bottom"><span class="food-card-weight">' + (item.weight||'') + '</span><span class="food-card-price">' + priceDisplay + '</span></div>' +
    '</div></div>';
}

function pluralRu(n, one, few, many) {
  var mod10 = n % 10;
  var mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return many;
  if (mod10 === 1) return one;
  if (mod10 >= 2 && mod10 <= 4) return few;
  return many;
}

function reviewTimeAgo(daysAgo) {
  var now = new Date();
  var extra = Math.floor((now - REVIEWS_ANCHOR) / (1000 * 60 * 60 * 24));
  var total = daysAgo + (extra > 0 ? extra : 0);
  if (total === 0) return '\u0421\u0435\u0433\u043E\u0434\u043D\u044F';
  if (total < 30) return total + ' ' + pluralRu(total, '\u0434\u0435\u043D\u044C', '\u0434\u043D\u044F', '\u0434\u043D\u0435\u0439') + ' \u043D\u0430\u0437\u0430\u0434';
  var months = Math.floor(total / 30);
  if (months < 12) return months + ' ' + pluralRu(months, '\u043C\u0435\u0441\u044F\u0446', '\u043C\u0435\u0441\u044F\u0446\u0430', '\u043C\u0435\u0441\u044F\u0446\u0435\u0432') + ' \u043D\u0430\u0437\u0430\u0434';
  var years = Math.floor(total / 365);
  var remMonths = Math.floor((total - years * 365) / 30);
  if (remMonths > 0) return years + ' ' + pluralRu(years, '\u0433\u043E\u0434', '\u0433\u043E\u0434\u0430', '\u043B\u0435\u0442') + ' ' + remMonths + ' ' + pluralRu(remMonths, '\u043C\u0435\u0441\u044F\u0446', '\u043C\u0435\u0441\u044F\u0446\u0430', '\u043C\u0435\u0441\u044F\u0446\u0435\u0432') + ' \u043D\u0430\u0437\u0430\u0434';
  return years + ' ' + pluralRu(years, '\u0433\u043E\u0434', '\u0433\u043E\u0434\u0430', '\u043B\u0435\u0442') + ' \u043D\u0430\u0437\u0430\u0434';
}

// ===== HELPERS =====
function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== SEARCH & FILTER =====
function filterMenu(loc) {
  currentSearch[loc] = document.getElementById('search-' + loc).value.toLowerCase().trim();
  var clearBtn = document.getElementById('search-clear-' + loc);
  if(clearBtn) clearBtn.classList.toggle('show', currentSearch[loc].length > 0);
  applyFilters(loc);
}

function clearSearch(loc) {
  var input = document.getElementById('search-' + loc);
  input.value = '';
  input.focus();
  filterMenu(loc);
}

function setFilter(loc, filter, btn) {
  var container = document.getElementById('filters-' + loc);
  container.querySelectorAll('.filter-tag').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  currentFilter[loc] = filter;
  applyFilters(loc);
}

function applyFilters(loc) {
  var query = currentSearch[loc];
  var filter = currentFilter[loc];
  var menu = document.getElementById('menu-' + loc);
  var cards = menu.querySelectorAll('.food-card');

  cards.forEach(function(card) {
    var name = (card.dataset.name || '').toLowerCase();
    var price = parseInt(card.dataset.price) || 0;
    var tags = (card.dataset.tags || '').split(',').filter(Boolean);
    var show = true;

    if (query && !name.includes(query)) show = false;
    if (show && filter === 'spicy' && tags.indexOf('spicy') === -1) show = false;
    if (show && filter === 'veg' && tags.indexOf('veg') === -1) show = false;
    if (show && filter === 'under200' && price >= 200) show = false;

    card.style.display = show ? '' : 'none';
  });

  // Price sorting
  if (filter === 'priceAsc' || filter === 'priceDesc') {
    menu.querySelectorAll('.card-grid').forEach(function(grid) {
      var items = Array.from(grid.children).filter(function(c){ return c.style.display !== 'none'; });
      items.sort(function(a, b) {
        var pa = parseInt(a.dataset.price) || 0;
        var pb = parseInt(b.dataset.price) || 0;
        return filter === 'priceAsc' ? pa - pb : pb - pa;
      });
      items.forEach(function(item){ grid.appendChild(item); });
    });
  }

  // Hide empty sections
  menu.querySelectorAll('.menu-section').forEach(function(sec) {
    if (sec.querySelector('.addons-section')) {
      if (query) {
        var hasAddon = false;
        sec.querySelectorAll('.addon-row').forEach(function(row){
          var n = row.querySelector('span').textContent.toLowerCase();
          var show = n.includes(query);
          row.style.display = show ? '' : 'none';
          if(show) hasAddon = true;
        });
        sec.style.display = hasAddon ? '' : 'none';
      } else {
        sec.style.display = '';
        sec.querySelectorAll('.addon-row').forEach(function(r){r.style.display='';});
      }
      return;
    }
    if (sec.querySelector('.drinks-grid')) {
      if (query) {
        var hasDrink = false;
        sec.querySelectorAll('.drink-card').forEach(function(dc){
          var n = dc.querySelector('.drink-name').textContent.toLowerCase();
          var show = n.includes(query);
          dc.style.display = show ? '' : 'none';
          if(show) hasDrink = true;
        });
        sec.style.display = hasDrink ? '' : 'none';
      } else {
        sec.style.display = '';
        sec.querySelectorAll('.drink-card').forEach(function(dc){dc.style.display='';});
      }
      return;
    }
    var visible = sec.querySelectorAll('.food-card:not([style*="display: none"])');
    sec.style.display = visible.length === 0 ? 'none' : '';
  });

  // No results
  var existing = menu.querySelector('.no-results');
  if (existing) existing.remove();
  var allHidden = Array.from(menu.querySelectorAll('.menu-section')).every(function(s){ return s.style.display === 'none'; });
  if (allHidden && query) {
    menu.insertAdjacentHTML('beforeend', '<div class="no-results"><span>\uD83D\uDD0D</span>\u041D\u0438\u0447\u0435\u0433\u043E \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u043E \u043F\u043E \u0437\u0430\u043F\u0440\u043E\u0441\u0443 \u00AB' + escapeHtml(query) + '\u00BB</div>');
  }
}

// ===== MODAL =====
function openModal(sectionKey, index) {
  var data = MENU_DATA[sectionKey];
  if (!data || !data.items[index]) return;
  modalItems = data.items;
  modalIndex = index;
  renderModalContent();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalContent() {
  var item = modalItems[modalIndex];
  if (!item) return;
  var mc = document.getElementById('modal-content');
  var imgSrc = item.img || '';
  var priceDisplay = item.priceLabel || (item.price + '\u20BD');
  var tagsHtml = (item.tags||[]).map(function(t){
    var cls = t === 'spicy' ? 'spicy' : 'veg';
    var label = t === 'spicy' ? '\uD83C\uDF36 \u041E\u0441\u0442\u0440\u043E\u0435' : '\uD83E\uDD6C \u0412\u0435\u0433';
    return '<span class="food-card-tag ' + cls + '">' + label + '</span>';
  }).join('');

  var sizesHtml = '';
  if (item.sizes) {
    sizesHtml = '<div class="modal-sizes">';
    item.sizes.forEach(function(s){
      sizesHtml += '<span class="modal-size-badge">' + s.label + ': ' + s.price + '\u20BD (' + s.weight + ')</span>';
    });
    sizesHtml += '</div>';
  }

  mc.innerHTML =
    (imgSrc ? '<img class="modal-img" src="' + imgSrc + '" alt="' + escapeAttr(item.name) + '" onerror="this.style.display=\'none\'">' : '') +
    '<div class="modal-body">' +
      '<div class="modal-name">' + item.name + '</div>' +
      (item.sub ? '<div style="font-size:.85rem;color:var(--text-muted);font-style:italic;margin-bottom:.3rem">' + item.sub + '</div>' : '') +
      '<div class="modal-rating">\u2605 ' + item.rating + '</div>' +
      (tagsHtml ? '<div class="food-card-tags" style="margin-bottom:.5rem">' + tagsHtml + '</div>' : '') +
      '<p class="modal-desc">' + item.desc + '</p>' +
      sizesHtml +
      '<div class="modal-info"><span class="modal-weight">' + (item.weight||'') + '</span><span class="modal-price">' + priceDisplay + '</span></div>' +
    '</div>';

  document.querySelector('.modal-nav.prev').style.display = modalIndex > 0 ? '' : 'none';
  document.querySelector('.modal-nav.next').style.display = modalIndex < modalItems.length - 1 ? '' : 'none';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function modalNav(dir) {
  var ni = modalIndex + dir;
  if (ni >= 0 && ni < modalItems.length) {
    modalIndex = ni;
    renderModalContent();
  }
}

// Card click delegation
document.addEventListener('click', function(e) {
  var card = e.target.closest('.food-card');
  if (!card) return;
  var section = card.dataset.section;
  var idx = parseInt(card.dataset.idx);
  if (section && !isNaN(idx)) {
    openModal(section, idx);
  }
});

// Modal keyboard
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') modalNav(-1);
  if (e.key === 'ArrowRight') modalNav(1);
});

// Modal swipe
var touchStartX = 0;
document.getElementById('modal').addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].screenX;
}, {passive:true});
document.getElementById('modal').addEventListener('touchend', function(e) {
  var diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) modalNav(diff > 0 ? -1 : 1);
}, {passive:true});

// Close on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== SCROLL OBSERVERS =====
var cardObserver = null;
function observeCards() {
  if (cardObserver) cardObserver.disconnect();
  var activeView = document.querySelector('.view.active');
  if (!activeView) return;
  var cards = activeView.querySelectorAll('.food-card, .drink-card, .review-card');
  // Make cards above the fold visible immediately
  var viewportH = window.innerHeight;
  cards.forEach(function(card) {
    var rect = card.getBoundingClientRect();
    if (rect.top < viewportH + 50) {
      card.classList.add('visible');
    }
  });
  // Observe remaining cards for scroll animation
  cardObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        cardObserver.unobserve(entry.target);
      }
    });
  }, {threshold:0.08, rootMargin:'0px 0px -20px 0px'});

  cards.forEach(function(card) {
    if (!card.classList.contains('visible')) {
      card.classList.add('fade-in');
      cardObserver.observe(card);
    }
  });
}

// ===== SCROLL SPY (debounced) =====
var scrollSpyRaf = null;
function setupScrollSpy(loc) {
  window.addEventListener('scroll', function() {
    if (scrollSpyRaf) return;
    scrollSpyRaf = requestAnimationFrame(function() {
      scrollSpyRaf = null;
      var tabs = document.querySelectorAll('#cat-tabs-' + loc + ' .cat-tab');
      if (!tabs.length) return;
      var view = document.getElementById(loc === 'ch' ? 'view-chernyshevskogo' : 'view-kirova');
      if (!view || !view.classList.contains('active')) return;

      var scrollY = window.scrollY + 100;
      var activeId = '';
      tabs.forEach(function(tab) {
        var sec = document.getElementById(tab.dataset.target);
        if (sec && sec.offsetTop <= scrollY) activeId = sec.id;
      });
      tabs.forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.target === activeId);
      });
      var activeTab = document.querySelector('#cat-tabs-' + loc + ' .cat-tab.active');
      if (activeTab) {
        activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
      }
      // Back to top
      var show = window.scrollY > 300;
      document.querySelectorAll('.back-top').forEach(function(btn) {
        btn.classList.toggle('show', show);
      });
    });
  }, {passive:true});
}

function scrollToSection(id) {
  var el = document.getElementById(id);
  if (el) {
    var y = el.getBoundingClientRect().top + window.pageYOffset - 90;
    window.scrollTo({top: y, behavior: 'smooth'});
  }
}

// ===== INIT =====
function init() {
  var saved = localStorage.getItem('cs-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcons();

  renderMenu('ch');
  renderMenu('ki');
  setupScrollSpy('ch');
  setupScrollSpy('ki');

  var hash = window.location.hash.replace('#','') || 'landing';
  setView(hash);
  setTimeout(observeCards, 250);
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
